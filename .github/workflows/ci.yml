name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build apps/api (type-check)
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Build apps/web
        run: npx vite build
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ secrets.PREVIEW_API_URL || 'https://thepillboard-api-preview.signalsbylandy.workers.dev' }}
          VITE_WS_URL: ${{ secrets.PREVIEW_WS_URL || 'wss://thepillboard-api-preview.signalsbylandy.workers.dev' }}

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 1
