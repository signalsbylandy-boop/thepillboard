name: Feature Request
description: Suggest a new feature or improvement
title: "[FEAT] "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Authentication
        - Content Submission
        - Voting
        - Comments
        - Real-time / WebSocket
        - Moderation
        - Performance
        - UI/UX
        - Infrastructure
        - Analytics
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What's the use case?
      placeholder: As a user I want to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — Critical / blocking
        - P1 — High
        - P2 — Medium
        - P3 — Nice to have
    validations:
      required: true
